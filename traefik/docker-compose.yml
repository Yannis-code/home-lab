services:
  traefik:
    container_name: traefik
    image: "traefik:3.6.8"
    restart: always
    pull_policy: always
    networks:
      - proxy
    command:
      # Entrypoints HTTP + HTTPS
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"

      # Providers
      - "--providers.docker"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=proxy"
      - "--serversTransport.insecureSkipVerify=true"
      - "--log.level=DEBUG"

      # API & Dashboard
      - "--api.dashboard=true"
      - "--api.insecure=false"

      # Let's Encrypt (resolver ACME)
      - "--certificatesresolvers.leresolver.acme.httpchallenge=true"
      - "--certificatesresolvers.leresolver.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.leresolver.acme.email=yannis.roche.12@gmail.com"
      - "--certificatesresolvers.leresolver.acme.storage=/letsencrypt/acme.json"

      # Redirection globale HTTP -> HTTPS
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      - "--entrypoints.web.http.redirections.entrypoint.permanent=true"

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
      - "letsencrypt:/letsencrypt"
      - "./.htpasswd:/etc/traefik/.htpasswd"

    labels:
      - "traefik.enable=true"

      - "traefik.http.routers.http-catchall.rule=hostregexp(`{host:.+}`)"
      - "traefik.http.routers.http-catchall.entrypoints=web"
      - "traefik.http.routers.http-catchall.service=noop@internal"

      - "traefik.http.routers.http-catchall.middlewares=redirect-to-https"

      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"

      # Dashboard en HTTPS
      - "traefik.http.routers.dashboard.rule=Host(`traefik.doudou.house`)"
      - "traefik.http.routers.dashboard.entrypoints=websecure"
      - "traefik.http.routers.dashboard.tls.certresolver=leresolver"
      - "traefik.http.routers.dashboard.service=api@internal"
      - "traefik.http.routers.dashboard.middlewares=auth"
      - "traefik.http.middlewares.auth.basicauth.usersfile=/etc/traefik/.htpasswd"
      # echo -n "user:$(openssl passwd -apr1 'password') >> .htpasswd"
      
      # Home Assistant redirige vers 192.168.150.10:8123 (NIC de management NAT)
      - "traefik.http.routers.homeassistant.rule=Host(`home-assistant.doudou.house`)"
      - "traefik.http.routers.homeassistant.entrypoints=websecure"
      - "traefik.http.routers.homeassistant.tls.certresolver=leresolver"
      - "traefik.http.routers.homeassistant.service=homeassistant"
      - "traefik.http.services.homeassistant.loadbalancer.server.url=http://192.168.150.10:8123"
      - "traefik.http.services.homeassistant.loadbalancer.passhostheader=false"
      
      # Cockpit redirigé vers 192.168.1.152:9090
      - "traefik.http.routers.cockpit.rule=Host(`cockpit.doudou.house`)"
      - "traefik.http.routers.cockpit.entrypoints=websecure"
      - "traefik.http.routers.cockpit.tls.certresolver=leresolver"
      - "traefik.http.routers.cockpit.service=cockpit"
      - "traefik.http.services.cockpit.loadbalancer.server.url=https://192.168.1.152:9090"

volumes:
  letsencrypt:
